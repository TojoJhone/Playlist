<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - RKDYIPTV</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: system-ui, -apple-system;
}

body{
    min-height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

/* Outer neon border */
.neon-wrapper{
    width:100%;
    max-width:390px;
    padding:3px;
    border-radius:18px;
    background:linear-gradient(
        90deg,
        #00fff7,#ff00ff,#00ff6a,#ffb300,#00fff7
    );
    background-size:500% 500%;
    animation:neonMove 5s linear infinite;
}

@keyframes neonMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    background:#0b0b0b;
    border-radius:15px;
    padding:20px;
    color:#fff;
}

/* Title color animation */
@keyframes colorShift{
    0%{color:#00fff7;}
    50%{color:#ff00ff;}
    100%{color:#00ff6a;}
}

h1{
    text-align:center;
    font-size:22px;
    animation:colorShift 3s infinite;
}

p{
    text-align:center;
    font-size:14px;
    margin:8px 0 15px;
    opacity:.9;
}

.screenshot-text{
    text-align:center;
    font-weight:600;
    animation:colorShift 2.5s infinite;
    margin-bottom:15px;
}

/* Telegram Button */
.tg-btn{
    display:block;
    width:100%;
    max-width:240px;
    margin:0 auto 25px;
    padding:13px 0;
    text-align:center;
    text-decoration:none;
    border-radius:30px;
    font-weight:600;
    border:2px solid currentColor;
    animation:colorShift 3s infinite;
}

/* Example Box */
.example-box{
    border:2px dashed #444;
    border-radius:12px;
    padding:12px;
    margin-top:10px;
}

.example-title{
    text-align:center;
    font-size:14px;
    margin-bottom:8px;
    color:#ffb300;
}

.example-box img{
    width:100%;
    border-radius:10px;
    display:block;
}

.example-note{
    text-align:center;
    font-size:12px;
    margin-top:8px;
    opacity:.85;
}
</style>
</head>

<body>

<div class="neon-wrapper">
<div class="container">

    <!-- MAIN THANK YOU -->
    <h1>Thank You ❤️</h1>
    <p>Thank you for using <b>RKDYIPTV</b></p>

    <div class="screenshot-text">
        SEND SCREENSHOT 👇👇
    </div>

    <a href="https://t.me/rkdyhelp1_bot" target="_blank" class="tg-btn">
        Contact Support
    </a>

    

</body>
</html>
