<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKDYIPTV - Smart Proxy Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Disable text selection */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        #output {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
        
        /* Premium Dark Background */
        body {
            background: #000000;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 255, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(138, 43, 226, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 0, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(0, 255, 157, 0.1) 0px, transparent 50%);
        }
        
        /* Rotating Neon Border Color Animation */
        @keyframes rotateHue {
            0% {
                filter: hue-rotate(0deg);
            }
            100% {
                filter: hue-rotate(360deg);
            }
        }
        
        @keyframes borderGlow {
            0%, 100% {
                box-shadow: 
                    0 0 20px rgba(0, 255, 255, 0.8),
                    0 0 40px rgba(0, 255, 255, 0.5),
                    inset 0 0 20px rgba(0, 255, 255, 0.2);
            }
            25% {
                box-shadow: 
                    0 0 20px rgba(0, 255, 157, 0.8),
                    0 0 40px rgba(0, 255, 157, 0.5),
                    inset 0 0 20px rgba(0, 255, 157, 0.2);
            }
            50% {
                box-shadow: 
                    0 0 20px rgba(255, 0, 255, 0.8),
                    0 0 40px rgba(255, 0, 255, 0.5),
                    inset 0 0 20px rgba(255, 0, 255, 0.2);
            }
            75% {
                box-shadow: 
                    0 0 20px rgba(138, 43, 226, 0.8),
                    0 0 40px rgba(138, 43, 226, 0.5),
                    inset 0 0 20px rgba(138, 43, 226, 0.2);
            }
        }
        
        @keyframes neonPulse {
            0%, 100% {
                filter: brightness(1) drop-shadow(0 0 20px currentColor);
            }
            50% {
                filter: brightness(1.3) drop-shadow(0 0 30px currentColor);
            }
        }
        
        /* Premium Container with Color Rotating Border */
        .premium-container {
            position: relative;
            background: rgba(10, 10, 10, 0.9);
            border-radius: 20px;
            padding: 3rem;
            backdrop-filter: blur(20px);
            border: 3px solid #00ffff;
            animation: borderGlow 4s ease-in-out infinite, rotateHue 8s linear infinite;
        }
        
        /* Neon Box for Output */
        .neon-box {
            position: relative;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ff00ff;
            animation: rotateHue 6s linear infinite;
            box-shadow: 
                0 0 30px rgba(255, 0, 255, 0.6),
                inset 0 0 30px rgba(255, 0, 255, 0.1);
        }
        
        /* Premium Buttons with Neon Glow */
        .neon-btn {
            position: relative;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .neon-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .neon-btn:active::before {
            width: 400px;
            height: 400px;
        }
        
        .neon-btn-cyan {
            background: linear-gradient(135deg, #00ffff, #00b8d4);
            color: #000;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.5),
                0 0 40px rgba(0, 255, 255, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        .neon-btn-cyan:hover {
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.8),
                0 0 60px rgba(0, 255, 255, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }
        
        .neon-btn-green {
            background: linear-gradient(135deg, #00ff9d, #00d68f);
            color: #000;
            box-shadow: 
                0 0 20px rgba(0, 255, 157, 0.5),
                0 0 40px rgba(0, 255, 157, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        .neon-btn-green:hover {
            box-shadow: 
                0 0 30px rgba(0, 255, 157, 0.8),
                0 0 60px rgba(0, 255, 157, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }
        
        .neon-btn-purple {
            background: linear-gradient(135deg, #ff00ff, #8a2be2);
            color: #fff;
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.5),
                0 0 40px rgba(255, 0, 255, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        .neon-btn-purple:hover {
            box-shadow: 
                0 0 30px rgba(255, 0, 255, 0.8),
                0 0 60px rgba(255, 0, 255, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }
        
        .neon-btn-orange {
            background: linear-gradient(135deg, #ff6b35, #ff4500);
            color: #fff;
            box-shadow: 
                0 0 20px rgba(255, 107, 53, 0.5),
                0 0 40px rgba(255, 107, 53, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        .neon-btn-orange:hover {
            box-shadow: 
                0 0 30px rgba(255, 107, 53, 0.8),
                0 0 60px rgba(255, 107, 53, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }
        
        .neon-btn-telegram {
            background: linear-gradient(135deg, #0088cc, #229ED9);
            color: #fff;
            box-shadow: 
                0 0 20px rgba(34, 158, 217, 0.5),
                0 0 40px rgba(34, 158, 217, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        .neon-btn-telegram:hover {
            box-shadow: 
                0 0 30px rgba(34, 158, 217, 0.8),
                0 0 60px rgba(34, 158, 217, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }
        
        /* Premium Title */
        .premium-title {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(
                90deg,
                #00ffff,
                #00ff9d,
                #ff00ff,
                #8a2be2,
                #00ffff
            );
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 3s ease infinite, neonPulse 2s ease-in-out infinite;
            text-shadow: 
                0 0 30px rgba(0, 255, 255, 0.5),
                0 0 60px rgba(255, 0, 255, 0.3);
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.8));
        }
        
        @keyframes gradientFlow {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        
        /* Output Textarea */
        #output {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid transparent;
            background-clip: padding-box;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px rgba(0, 255, 157, 0.5);
            position: relative;
            z-index: 1;
        }
        
        #output:focus {
            outline: none;
            box-shadow: 
                inset 0 0 30px rgba(0, 255, 255, 0.2),
                0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        /* Custom Scrollbar */
        textarea::-webkit-scrollbar {
            width: 12px;
        }
        
        textarea::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }
        
        textarea::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00ffff, #ff00ff);
            border-radius: 10px;
            border: 2px solid rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        textarea::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00ff9d, #8a2be2);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.8);
        }
        
        /* Status with Neon Glow */
        #status {
            text-shadow: 0 0 10px currentColor;
            animation: neonPulse 2s ease-in-out infinite;
        }
        
        /* Progress Bar */
        .progress-bar {
            height: 6px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 
                inset 0 0 10px rgba(0, 0, 0, 0.8),
                0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #00ff9d, #ff00ff);
            background-size: 200% 100%;
            animation: progressFlow 2s linear infinite;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            transition: width 0.3s ease;
        }
        
        @keyframes progressFlow {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 200% 0%;
            }
        }
        
        /* Copy Button */
        #copyBtn {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 10px rgba(0, 255, 255, 0.3),
                inset 0 0 10px rgba(0, 255, 255, 0.1);
        }
        
        #copyBtn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.6),
                inset 0 0 20px rgba(0, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        #copyBtn.copied {
            border-color: #00ff9d;
            color: #00ff9d;
            box-shadow: 
                0 0 20px rgba(0, 255, 157, 0.6),
                inset 0 0 20px rgba(0, 255, 157, 0.2);
        }
        
        /* Loading Spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading {
            animation: spin 1s linear infinite;
        }
        
        /* Fade In Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        /* Floating Particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #00ffff;
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite;
            box-shadow: 0 0 10px #00ffff;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .premium-title {
                font-size: 2.5rem;
            }
            
            .premium-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
