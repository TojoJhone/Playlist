name: Update Mix Playlist

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate playlist
        run: |
          mkdir -p Playlist/Mix.m3u

          HTML_FILE=html.txt
          HEADER_FILE=header.m3u
          BODY_FILE=body.m3u

          # Browser redirect
          echo '<!DOCTYPE html>' > $HTML_FILE
          echo '<html><script>window.location.href="https://telegram.me/rkdyiptv";</script></html>' >> $HTML_FILE

          # Playlist header
          echo '#EXTM3U' > $HEADER_FILE
          echo '# Credit: RKDYIPTV Mix Playlist' >> $HEADER_FILE
          echo "#Updated $(date)" >> $HEADER_FILE

          # Fetch playlists
          curl -L -s https://github.com/alex4528x/m3u/raw/refs/heads/main/jtv.m3u >> $BODY_FILE
          curl -L -s https://github.com/alex4528x/m3u/raw/refs/heads/main/jstar.m3u >> $BODY_FILE
          curl -L -s https://github.com/alex4528x/m3u/raw/refs/heads/main/jcinema.m3u >> $BODY_FILE
          curl -L -s https://livetv-cb7.pages.dev/hotstar >> $BODY_FILE

          # Remove extra headers
          grep -v '^#EXTM3U' $BODY_FILE > clean.m3u

          # Final playlist
          cat $HTML_FILE $HEADER_FILE clean.m3u > Playlist/Mix.m3u/index.html

          rm -f $HTML_FILE $HEADER_FILE $BODY_FILE clean.m3u

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Playlist/Mix.m3u/index.html
          git commit -m "Auto update Mix playlist" || echo "No changes"

      - name: Push changes
        run: |
          git pull --rebase origin main
          git push origin main
