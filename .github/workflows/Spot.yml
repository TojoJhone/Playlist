name: Update Cricket Playlist

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate playlist
        run: |
          mkdir -p Playlist/Cricket.m3u

          HTML_FILE=html.txt
          HEADER_FILE=header.m3u
          BODY_FILE=body.m3u
          TEMP_FILE=temp.m3u

          echo '<!DOCTYPE html>' > $HTML_FILE
          echo '<html><script>window.location.href="https://telegram.me/rkdyiptv";</script></html>' >> $HTML_FILE

          echo '#EXTM3U' > $HEADER_FILE
          echo '# Credit: RKDYIPTV' >> $HEADER_FILE
          echo "#Updated $(date)" >> $HEADER_FILE

          curl -L -s -o $TEMP_FILE "https://github.com/abusaeeidx/IPTV-Scraper-Zilla/raw/refs/heads/main/CricHD.m3u"

          grep -v -E 'Abu SAEEID|Github @abusaeeidx|Update on|Note:' $TEMP_FILE > $BODY_FILE || true

          cat >> $BODY_FILE <<'EOF'
#EXTINF:-1 tvg-id="starsports1hd.in" tvg-name="STAR SPORTS 1 ENGLISH HD" tvg-logo="https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg" group-title="SPORTS",STAR SPORTS 1 ENGLISH HD
https://yupptv.rkdyiptv.workers.dev/live/938.m3u8
#EXTINF:-1 tvg-id="starsports1hdhindi.in" tvg-name="STAR SPORTS 1 HINDI HD" tvg-logo="https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg" group-title="SPORTS",STAR SPORTS 1 HINDI HD
https://yupptv.rkdyiptv.workers.dev/live/2894.m3u8
#EXTINF:-1 tvg-id="starsports2hd.in" tvg-name="STAR SPORTS 2 ENGLISH HD" tvg-logo="https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg" group-title="SPORTS",STAR SPORTS 2 ENGLISH HD
https://yupptv.rkdyiptv.workers.dev/live/939.m3u8
#EXTINF:-1 tvg-id="starsports2hd.in" tvg-name="STAR SPORTS 2 HINDI HD" tvg-logo="https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg" group-title="SPORTS",STAR SPORTS 2 HINDI HD
https://yupptv.rkdyiptv.workers.dev/live/6828.m3u8
EOF

          cat $HTML_FILE $HEADER_FILE $BODY_FILE > Playlist/Cricket.m3u/index.html

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Playlist/Cricket.m3u/index.html
          git commit -m "Auto update RKDYIPTV Cricket playlist" || echo "No changes"

      - name: Push changes
        run: |
          git pull --rebase origin main
          git push origin main
