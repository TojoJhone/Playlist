name: Update Fancode Playlist

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate playlist
        run: |
          mkdir -p Playlist/fc.m3u

          HTML_FILE=html.txt
          HEADER_FILE=header.m3u
          BODY_FILE=body.m3u
          TEMP_FILE=temp.m3u

          # Browser redirect (IPTV apps ignore JS)
          echo '<!DOCTYPE html>' > $HTML_FILE
          echo '<html>' >> $HTML_FILE
          echo '<script>' >> $HTML_FILE
          echo 'var ua = navigator.userAgent.toLowerCase();' >> $HTML_FILE
          echo 'if (ua.includes("mozilla") || ua.includes("chrome") || ua.includes("safari") || ua.includes("firefox")) {' >> $HTML_FILE
          echo 'window.location.href="https://telegram.me/rkdyiptv";' >> $HTML_FILE
          echo '}' >> $HTML_FILE
          echo '</script>' >> $HTML_FILE
          echo '</html>' >> $HTML_FILE

          # Playlist header + credit
          echo '#EXTM3U' > $HEADER_FILE
          echo '# Credit: RKDYIPTV' >> $HEADER_FILE
          echo "#Updated $(date)" >> $HEADER_FILE

          # Fetch original playlist
          curl -L -s -o $TEMP_FILE "https://github.com/jitendra-unatti/fancode/raw/refs/heads/main/data/fancode.m3u"

          # Remove original header
          grep -v '^#EXTM3U' $TEMP_FILE > $BODY_FILE || true

          # Combine HTML + playlist
          cat $HTML_FILE $HEADER_FILE $BODY_FILE > Playlist/fc.m3u/index.html

          rm -f $HTML_FILE $HEADER_FILE $BODY_FILE $TEMP_FILE

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Playlist/fc.m3u/index.html
          git commit -m "Auto update RKDYIPTV Fancode playlist" || echo "No changes"

      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
