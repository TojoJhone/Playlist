name: Generate Hotstar Playlist

permissions:
  contents: write

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate playlist
        run: |

          mkdir -p Playlist/test

          TEMP=temp.m3u
          OUT=Playlist/test/index.html

          # Fetch playlist
          curl -L -s https://livetv-cb7.pages.dev/hotstar > $TEMP

          # Convert to JS format
          echo "<!DOCTYPE html>" > $OUT
          echo "<html>" >> $OUT
          echo "<script>" >> $OUT
          echo "window.location.href='https://telegram.me/rkdyiptv';" >> $OUT
          echo "const playlist = \`" >> $OUT
          cat $TEMP >> $OUT
          echo "\`;" >> $OUT
          echo "</script>" >> $OUT
          echo "</html>" >> $OUT

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Playlist/test/index.html
          git commit -m "Update playlist $(date)" || echo "No changes"

      - name: Push
        run: |
          git push
