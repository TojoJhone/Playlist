name: Update Cricket Playlist

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

env:
  SRC1: ${{ secrets.SOURCE_PLAYLIST1 }}
  SRC2: ${{ secrets.SOURCE_PLAYLIST2 }}
  SRC3: ${{ secrets.SOURCE_PLAYLIST3 }}

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate playlist
        run: |

          HTML=html.txt
          HEADER=header.m3u
          BODY=body.m3u
          TEMP=temp.m3u
          HOTSTAR=hotstar.m3u

          # ensure folder exists
          mkdir -p Playlist/Cricket.m3u

          # Telegram redirect
          echo '<!DOCTYPE html><html><script>window.location.href="https://telegram.me/rkdyiptv";</script></html>' > $HTML

          # Playlist header
          echo '#EXTM3U' > $HEADER
          echo '# Credit: RKDYIPTV Cricket Playlist' >> $HEADER
          echo "#Updated $(date)" >> $HEADER

          # Fetch playlist 1
          curl -L -s "$SRC1" > $TEMP

          grep -v -E "Abu SAEEID|Github @abusaeeidx|Update on|Note:" $TEMP >> $BODY

          # Fetch playlist 2
          curl -L -s "$SRC2" > $HOTSTAR

          awk 'BEGIN{IGNORECASE=1}/group-title="sports"/{print;getline;print}' $HOTSTAR >> $BODY

          awk 'BEGIN{IGNORECASE=1}/star.?sports/{print;getline;print}' $HOTSTAR >> $BODY

          # Fetch playlist 3
          curl -L -s "$SRC3" >> $BODY

          grep -v '^#EXTM3U' $BODY > clean.m3u

          # overwrite playlist
          cat $HTML $HEADER clean.m3u > Playlist/Cricket.m3u/index.html

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update Cricket playlist $(date)" || echo "No changes"

      - name: Push changes
        run: |
          git push
