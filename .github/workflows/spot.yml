name: Update Cricket Playlist
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
env:
  SRC1: ${{ secrets.SOURCE_PLAYLIST1 }}
  SRC2: ${{ secrets.SOURCE_PLAYLIST2 }}
  SRC3: ${{ secrets.SOURCE_PLAYLIST3 }}
jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Generate playlist
        run: |
          set +e
          mkdir -p "Playlist/Cricket.m3u"
          WORKDIR="Playlist/Cricket.m3u"
          echo '#EXTM3U' > /tmp/output.m3u
          echo '# Credit: RKDYIPTV Cricket Playlist' >> /tmp/output.m3u
          echo "#Updated $(date)" >> /tmp/output.m3u
          curl -L -s --max-redirs 10 --retry 3 --retry-delay 2 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "$SRC1" | grep -v -E "Abu SAEEID|Github @abusaeeidx|Update on|Note:|#EXTM3U" >> /tmp/output.m3u
          curl -L -s --max-redirs 10 --retry 3 --retry-delay 2 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "$SRC2" | awk 'BEGIN{IGNORECASE=1}/group-title="sports"/{print;getline;print}' >> /tmp/output.m3u
          curl -L -s --max-redirs 10 --retry 3 --retry-delay 2 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "$SRC2" | awk 'BEGIN{IGNORECASE=1}/star.?sports/{print;getline;print}' >> /tmp/output.m3u
          curl -L -s --max-redirs 10 --retry 3 --retry-delay 2 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "$SRC3" | grep -v '^#EXTM3U' >> /tmp/output.m3u
          cp /tmp/output.m3u "$WORKDIR/index.html"
      - name: Debug - Check output
        run: |
          echo "=== File size ==="
          wc -l Playlist/Cricket.m3u/index.html
          echo "=== First 20 lines ==="
          head -20 Playlist/Cricket.m3u/index.html
      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update Cricket playlist $(date)" || echo "No changes"
      - name: Push
        run: git push
