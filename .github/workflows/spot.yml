name: Update Cricket Playlist

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate playlist
        run: |
          mkdir -p Playlist/Cricket.m3u

          HTML=html.txt
          HEADER=header.m3u
          BODY=body.m3u
          TEMP=temp.m3u
          HOTSTAR=hotstar.m3u
          RK=rk.m3u

          # Telegram redirect
          echo '<!DOCTYPE html><html><script>window.location.href="https://telegram.me/rkdyiptv";</script></html>' > $HTML

          # Playlist header
          echo '#EXTM3U' > $HEADER
          echo '# Credit: RKDYIPTV Cricket Playlist' >> $HEADER
          echo "#Updated $(TZ="Asia/Kolkata" date "+%Y-%m-%d %H:%M:%S IST")" >> $HEADER

          # Fetch CricHD playlist
          curl -L -s https://github.com/abusaeeidx/IPTV-Scraper-Zilla/raw/refs/heads/main/CricHD.m3u > $TEMP

          # Fetch new sports API playlist
          curl -L -s https://my-sports-api.vercel.app > $RK

          # Remove unwanted lines
          grep -v -E "Abu SAEEID|Github @abusaeeidx|Update on|Note:" $TEMP >> $BODY

          # Add sports api channels
          awk '
          BEGIN{IGNORECASE=1}
          /sports|cricket|star|ten|willow|sky.?sports/ {
          print
          getline
          print
          }
          ' $RK >> $BODY

          # Fetch Hotstar playlist
          curl -L -s https://livetv-cb7.pages.dev/hotstar > $HOTSTAR

          # Filter sports group
          awk '
          BEGIN{IGNORECASE=1}
          /group-title="sports"/ {
          print
          getline
          print
          }
          ' $HOTSTAR >> $BODY

          # Detect Star Sports channels
          awk '
          BEGIN{IGNORECASE=1}
          /star.?sports/ {
          print
          getline
          print
          }
          ' $HOTSTAR >> $BODY

          # Remove duplicate EXT header
          grep -v '^#EXTM3U' $BODY | awk '!seen[$0]++' > clean.m3u

          # Final playlist
          cat $HTML $HEADER clean.m3u > Playlist/Cricket.m3u/index.html

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Playlist/Cricket.m3u/index.html
          git commit -m "Update Cricket playlist $(TZ="Asia/Kolkata" date "+%Y-%m-%d %H:%M IST")" || echo "No changes"

      - name: Push changes
        run: |
          git pull --rebase origin main
          git push origin main
