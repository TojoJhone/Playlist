name: Update Cricket Playlist

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate playlist
        run: |

          mkdir -p Playlist/Cricket.m3u

          HTML=html.txt
          HEADER=header.m3u
          BODY=body.m3u
          TEMP=temp.m3u
          HOTSTAR=hotstar.m3u
          RK=rk.m3u

          # Telegram redirect
          echo '<!DOCTYPE html><html><script>window.location.href="https://telegram.me/rkdyiptv";</script></html>' > $HTML

          # Playlist header (IST time)
          echo '#EXTM3U' > $HEADER
          echo '# Credit: RKDYIPTV Cricket Playlist' >> $HEADER
          echo "#Updated $(TZ="Asia/Kolkata" date "+%Y-%m-%d %H:%M:%S IST")" >> $HEADER

          #################################
          # CricHD playlist
          #################################

          curl -L -s https://github.com/abusaeeidx/IPTV-Scraper-Zilla/raw/refs/heads/main/CricHD.m3u > $TEMP

          grep -v -E "Abu SAEEID|Github @abusaeeidx|Update on|Note:" $TEMP >> $BODY


          #################################
          # My Sports API
          #################################

          curl -L -s https://my-sports-api.vercel.app > $RK

          awk '
          BEGIN{IGNORECASE=1}
          /sports|cricket|star|ten|willow|sky.?sports/ {
          print
          getline; print
          getline; print
          getline; print
          getline; print
          }
          ' $RK >> $BODY


          #################################
          # Hotstar playlist
          #################################

          curl -L -s https://livetv-cb7.pages.dev/hotstar > $HOTSTAR

          awk '
          BEGIN{IGNORECASE=1}
          /group-title="sports"/ {
          print
          getline; print
          getline; print
          getline; print
          getline; print
          }
          ' $HOTSTAR >> $BODY


          #################################
          # Remove duplicate header
          #################################

          grep -v '^#EXTM3U' $BODY | awk '!seen[$0]++' > clean.m3u
