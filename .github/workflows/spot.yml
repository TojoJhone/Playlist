name: Update Cricket Playlist

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate playlist
        run: |
          mkdir -p Playlist/Cricket.m3u

          curl -L -s https://github.com/abusaeeidx/IPTV-Scraper-Zilla/raw/refs/heads/main/CricHD.m3u > temp.m3u

          grep -v -E "Abu SAEEID|Github @abusaeeidx|Update on|Note:" temp.m3u > body.m3u

          echo '#EXTM3U' > header.m3u
          echo '# Credit: RKDYIPTV' >> header.m3u

          echo '#EXTINF:-1 tvg-name="STAR SPORTS 1 ENGLISH HD" tvg-logo="https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg" group-title="SPORTS",STAR SPORTS 1 ENGLISH HD' >> body.m3u
          echo 'https://yupptv.rkdyiptv.workers.dev/live/938.m3u8' >> body.m3u

          echo '#EXTINF:-1 tvg-name="STAR SPORTS 1 HINDI HD" tvg-logo="https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg" group-title="SPORTS",STAR SPORTS 1 HINDI HD' >> body.m3u
          echo 'https://yupptv.rkdyiptv.workers.dev/live/2894.m3u8' >> body.m3u

          cat header.m3u body.m3u > Playlist/Cricket.m3u/index.html

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Playlist/Cricket.m3u/index.html
          git commit -m "Update Cricket playlist" || echo "No changes"

      - name: Push
        run: |
          git pull --rebase origin main
          git push origin main
