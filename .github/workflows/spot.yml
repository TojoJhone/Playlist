name: Update Cricket Playlist

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate playlist
        run: |
          mkdir -p Playlist/Cricket.m3u

          HTML=html.txt
          HEADER=header.m3u
          BODY=body.m3u
          TEMP=temp.m3u
          HOTSTAR=hotstar.m3u

          # Telegram redirect for browser
          echo '<!DOCTYPE html><html><script>window.location.href="https://telegram.me/rkdyiptv";</script></html>' > $HTML

          # Playlist header
          echo '#EXTM3U' > $HEADER
          echo '# Credit: RKDYIPTV' >> $HEADER

          # Fetch CricHD playlist
          curl -L -s https://github.com/abusaeeidx/IPTV-Scraper-Zilla/raw/refs/heads/main/CricHD.m3u > $TEMP

          # Remove unwanted lines
          grep -v -E "Abu SAEEID|Github @abusaeeidx|Update on|Note:" $TEMP >> $BODY

          # Fetch Hotstar playlist
          curl -L -s https://livetv-cb7.pages.dev/hotstar > $HOTSTAR

          # Filter only Star Sports 1 & 2
          awk '
          /Star Sports 1|STAR SPORTS 1|Star Sports 2|STAR SPORTS 2/ {print; getline; print}
          ' $HOTSTAR >> $BODY

          # Add custom channels
          echo '#EXTINF:-1 tvg-name="STAR SPORTS 1 ENGLISH HD" tvg-logo="https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg" group-title="SPORTS",STAR SPORTS 1 ENGLISH HD' >> $BODY
          echo 'https://yupptv.rkdyiptv.workers.dev/live/938.m3u8' >> $BODY

          echo '#EXTINF:-1 tvg-name="STAR SPORTS 1 HINDI HD" tvg-logo="https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg" group-title="SPORTS",STAR SPORTS 1 HINDI HD' >> $BODY
          echo 'https://yupptv.rkdyiptv.workers.dev/live/2894.m3u8' >> $BODY

          # Final playlist
          cat $HTML $HEADER $BODY > Playlist/Cricket.m3u/index.html

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Playlist/Cricket.m3u/index.html
          git commit -m "Update Cricket playlist" || echo "No changes"

      - name: Push
        run: |
          git pull --rebase origin main
          git push origin main
