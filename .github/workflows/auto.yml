name: Update Jio (__hdnea__) playlist

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update-jstar-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch playlist
        run: |
          mkdir -p playlist/Geo-plus

          HTML_FILE=html.txt
          HEADER_FILE=header.m3u
          BODY_FILE=body.m3u
          TEMP_FILE=temp.m3u

          # Telegram redirect HTML
          echo '<!DOCTYPE html>' > $HTML_FILE
          echo '<html>' >> $HTML_FILE
          echo '<script>' >> $HTML_FILE
          echo 'window.location.href = "https://telegram.me/rkdyiptv";' >> $HTML_FILE
          echo '</script>' >> $HTML_FILE
          echo '</html>' >> $HTML_FILE

          # Playlist header
          echo '#EXTM3U x-tvg-url="https://fakeall12398-sketch.github.io/JIO_TV/jio_epg.xml.gz"' > $HEADER_FILE
          echo "#Generated on $(date +%s)" >> $HEADER_FILE

          # Fetch original playlist
          curl -L -s -o $TEMP_FILE "https://livetv-cb7.pages.dev/hotstar"

          # Remove original headers
          grep -vE '^#EXTM3U|^#Generated on' $TEMP_FILE > $BODY_FILE || true

          # Combine HTML + playlist
          cat $HTML_FILE $HEADER_FILE $BODY_FILE > playlist/Geo-plus/index.html

          rm -f $HTML_FILE $HEADER_FILE $BODY_FILE $TEMP_FILE

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add playlist/Geo-plus/index.html
          git commit -m "Auto update Geo-plus playlist" || echo "No changes"

      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
