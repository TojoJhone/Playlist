name: Update Geo-plus Playlist

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate playlist
        run: |
          mkdir -p Playlist/Geo-plus.m3u

          HTML_FILE=html.txt
          HEADER_FILE=header.m3u
          BODY_FILE=body.m3u
          TEMP_FILE=temp.m3u

          # Browser redirect
          echo '<!DOCTYPE html>' > $HTML_FILE
          echo '<html>' >> $HTML_FILE
          echo '<script>' >> $HTML_FILE
          echo 'var ua = navigator.userAgent.toLowerCase();' >> $HTML_FILE
          echo 'if (ua.includes("mozilla") || ua.includes("chrome") || ua.includes("safari") || ua.includes("firefox")) {' >> $HTML_FILE
          echo 'window.location.href="https://telegram.me/rkdyiptv";' >> $HTML_FILE
          echo '}' >> $HTML_FILE
          echo '</script>' >> $HTML_FILE
          echo '</html>' >> $HTML_FILE

          # Playlist header
          echo '#EXTM3U' > $HEADER_FILE
          echo '# Credit: RKDYIPTV' >> $HEADER_FILE
          echo "#Updated $(date)" >> $HEADER_FILE

          # Fetch source playlist
          curl -L -s -o $TEMP_FILE "https://raw.githubusercontent.com/etcvai/ExtenderMax/refs/heads/main/iptv.m3u8"

          # Extract selected categories
          awk '
          BEGIN{IGNORECASE=1}
          /group-title="JIO TV"|group-title="JIOTV\+ \(IND IP\)"|group-title="BALL FTP"|group-title="BDXTV"|group-title="CRICHD"|group-title="SUN NXT"|group-title="ZEE5 LITE"/ {
              print
              getline
              print
          }
          ' $TEMP_FILE > $BODY_FILE

          # Replace group titles
          sed -i 's/group-title="BALL FTP"/group-title="RKDYIPTV"/Ig' $BODY_FILE
          sed -i 's/group-title="BDxtv"/group-title="RKDYIPTV"/Ig' $BODY_FILE
          sed -i 's/group-title="BDXTV"/group-title="RKDYIPTV"/Ig' $BODY_FILE

          # Add missing logos
          sed -i '/#EXTINF/ {/tvg-logo=/! s/#EXTINF:-1/#EXTINF:-1 tvg-logo="https:\/\/i.ibb.co\/VWVcf4t5\/RKDYIPTV.jpg"/}' $BODY_FILE

          # Combine redirect + playlist
          cat $HTML_FILE $HEADER_FILE $BODY_FILE > Playlist/Geo-plus.m3u/index.html

          rm -f $HTML_FILE $HEADER_FILE $BODY_FILE $TEMP_FILE

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Playlist/Geo-plus.m3u/index.html
          git commit -m "Update Geo-plus playlist RKDYIPTV" || echo "No changes"

      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
