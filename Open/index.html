<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - RKDYIPTV</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: system-ui, -apple-system;
}
body{
    min-height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    overflow:hidden;
    position:relative;
}

/* Animated Background Particles */
.particle{
    position:absolute;
    width:3px;
    height:3px;
    background:#00fff7;
    border-radius:50%;
    animation:float 8s infinite;
    opacity:0.6;
}
@keyframes float{
    0%,100%{transform:translateY(0) translateX(0);}
    50%{transform:translateY(-100vh) translateX(50px);}
}

/* Outer neon border with glow */
.neon-wrapper{
    width:100%;
    max-width:390px;
    padding:3px;
    border-radius:20px;
    background:linear-gradient(
        90deg,
        #00fff7,#ff00ff,#00ff6a,#ffb300,#00fff7
    );
    background-size:500% 500%;
    animation:neonMove 5s linear infinite;
    box-shadow:0 0 20px rgba(0,255,247,0.5),
               0 0 40px rgba(255,0,255,0.3);
    position:relative;
    z-index:10;
}
@keyframes neonMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    background:linear-gradient(135deg, #0b0b0b 0%, #1a1a1a 100%);
    border-radius:18px;
    padding:25px 20px;
    color:#fff;
    position:relative;
}

/* Floating hearts animation */
.heart{
    position:absolute;
    font-size:20px;
    animation:heartFloat 6s infinite;
    opacity:0;
}
@keyframes heartFloat{
    0%{
        transform:translateY(0) scale(0);
        opacity:0;
    }
    50%{
        opacity:1;
    }
    100%{
        transform:translateY(-300px) scale(1.5);
        opacity:0;
    }
}

/* Title with glow effect */
h1{
    text-align:center;
    font-size:26px;
    animation:colorShift 3s infinite, pulse 2s infinite;
    text-shadow:0 0 10px currentColor,
                0 0 20px currentColor,
                0 0 30px currentColor;
    margin-bottom:5px;
}
@keyframes colorShift{
    0%{color:#00fff7;}
    33%{color:#ff00ff;}
    66%{color:#00ff6a;}
    100%{color:#00fff7;}
}
@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

/* Subtitle with wave effect */
.subtitle{
    text-align:center;
    font-size:15px;
    font-weight:600;
    background:linear-gradient(90deg,#00fff7,#ff00ff,#00ff6a,#ffb300);
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    animation:gradient 4s ease infinite;
    margin-bottom:10px;
}
@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

p{
    text-align:center;
    font-size:14px;
    margin:8px 0 20px;
    opacity:.9;
    line-height:1.6;
}

/* Button wrapper for rotating neon border */
.button-wrapper{
    position:relative;
    width:100%;
    max-width:260px;
    margin:0 auto 18px;
    padding:3px;
    border-radius:50px;
    background:linear-gradient(
        90deg,
        #00fff7,#ff00ff,#00ff6a,#ffb300,#ff0080,#00fff7
    );
    background-size:400% 400%;
    animation:borderRotate 3s linear infinite, buttonPulse 1.5s ease-in-out infinite;
}
@keyframes borderRotate{
    0%{background-position:0% 50%;}
    100%{background-position:400% 50%;}
}
@keyframes buttonPulse{
    0%,100%{
        transform:scale(1);
        box-shadow:0 0 15px rgba(0,255,247,0.4);
    }
    50%{
        transform:scale(1.05);
        box-shadow:0 0 30px rgba(0,255,247,0.6),
                   0 0 50px rgba(255,0,255,0.4);
    }
}

/* Main button style with neon gradient background */
.tg-btn{
    display:block;
    width:100%;
    padding:15px 0;
    text-align:center;
    text-decoration:none;
    border-radius:50px;
    font-weight:700;
    font-size:16px;
    border:none;
    color:#fff;
    position:relative;
    overflow:hidden;
    transition:all 0.3s ease;
    background:linear-gradient(
        135deg,
        rgba(0,255,247,0.3),
        rgba(255,0,255,0.3),
        rgba(0,255,106,0.3)
    );
    background-size:200% 200%;
    animation:bgShift 3s ease infinite;
    text-shadow:0 0 10px rgba(255,255,255,0.8);
}
@keyframes bgShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.tg-btn:before{
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    width:0;
    height:0;
    border-radius:50%;
    background:rgba(255,255,255,0.3);
    transform:translate(-50%,-50%);
    transition:width 0.6s, height 0.6s;
}
.tg-btn:hover:before{
    width:300px;
    height:300px;
}
.tg-btn:hover{
    transform:translateY(-2px);
}
.tg-btn:active{
    transform:translateY(0) scale(0.98);
}

/* Telegram button specific style */
.tg-btn.telegram{
    background:linear-gradient(
        135deg,
        rgba(0,136,204,0.8),
        rgba(0,170,255,0.8),
        rgba(0,136,204,0.8)
    );
    background-size:200% 200%;
    animation:bgShift 3s ease infinite;
}

/* Telegram logo */
.tg-logo{
    display:inline-block;
    width:22px;
    height:22px;
    vertical-align:middle;
    margin-right:8px;
}

/* Loading animation */
.loading-bar{
    width:100%;
    height:3px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    overflow:hidden;
    margin-top:20px;
}
.loading-progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00fff7,#ff00ff,#00ff6a);
    animation:loading 3s infinite;
}
@keyframes loading{
    0%{width:0%;}
    100%{width:100%;}
}

/* Sparkle effect */
.sparkle{
    position:absolute;
    width:4px;
    height:4px;
    background:#fff;
    border-radius:50%;
    animation:sparkle 2s infinite;
}
@keyframes sparkle{
    0%,100%{opacity:0; transform:scale(0);}
    50%{opacity:1; transform:scale(1);}
}

/* Footer text */
.footer-text{
    text-align:center;
    font-size:11px;
    margin-top:15px;
    opacity:0.6;
    animation:fadeInOut 3s infinite;
}
@keyframes fadeInOut{
    0%,100%{opacity:0.6;}
    50%{opacity:1;}
}
</style>
</head>
